name: CI

on:
  pull_request:
  push:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, vet, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -buildvcs=false -ldflags="-s -w" -o tiny-vless .

  container:
    name: Build container
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag tiny-vless-ws:test .
